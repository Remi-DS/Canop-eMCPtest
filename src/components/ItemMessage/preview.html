<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Item Message Preview</title>
  <!-- Load React via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Load Babel to compile JSX on the fly -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Load the CSS file you created -->
  <link rel="stylesheet" href="ItemMessage.css" />
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Source Sans Pro', sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 {
      margin-top: 0;
      font-size: 14px;
      color: #888;
      margin-bottom: 16px;
      padding-bottom: 8px;
    }
  </style>
</head>
<body>
  <div style="max-width: 800px; margin: 0 auto;">
    <h1>Item Message Preview</h1>
    <p style="color: #666; margin-bottom: 40px;">Rendu du composant React avec ses diférents états directement dans le navigateur.</p>
    
    <div id="root"></div>

    <script type="text/babel">
      // Les icones
      const SuccessIcon = () => (
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 22C17.5 22 22 17.5 22 12C22 6.5 17.5 2 12 2C6.5 2 2 6.5 2 12C2 17.5 6.5 22 12 22ZM10.5 17L6 12.5L7.4 11.1L10.5 14.2L16.6 8.1L18 9.5L10.5 17Z" fill="currentColor"/>
        </svg>
      );

      const ErrorIcon = () => (
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 22C17.5 22 22 17.5 22 12C22 6.5 17.5 2 12 2C6.5 2 2 6.5 2 12C2 17.5 6.5 22 12 22ZM11 7H13V13H11V7ZM11 15H13V17H11V15Z" fill="currentColor"/>
        </svg>
      );

      const WarningIcon = () => (
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L1 21H23L12 2ZM12 6.1L19.5 19H4.5L12 6.1ZM11 10H13V14H11V10ZM11 16H13V18H11V16Z" fill="currentColor"/>
        </svg>
      );

      // Le composant rendu
      const ItemMessage = ({
        device = '--desk',
        status = '--sucess',
        text = 'Titre du message',
        theme = 'Prospect',
        className = ''
      }) => {
        const styleStr = status.replace('--', '');
        const deviceStr = device.replace('--', '');
        const themeStr = theme.toLowerCase();
        
        const containerClass = `item-message-container ${themeStr} ${deviceStr} ${styleStr} ${className}`.trim();
        
        const iconSize = theme === 'Prospect' 
          ? (device === '--desk' ? 24 : 20) 
          : 16;
        
        const renderIcon = () => {
          switch(status) {
            case '--error': return <ErrorIcon />;
            case '--warning': return <WarningIcon />;
            case '--sucess':
            default:
              return <SuccessIcon />;
          }
        };

        return (
          <div className={containerClass}>
            <div className="item-message-icon" style={{ width: iconSize, height: iconSize }}>
              {renderIcon()}
            </div>
            <div className="item-message-text">
              {text}
            </div>
          </div>
        );
      };

      const App = () => (
        <div className="grid">
          <div className="card">
            <h2>PROSPECT • DESK • SUCCESS</h2>
            <ItemMessage theme="Prospect" device="--desk" status="--sucess" text="La documentation a bien été transmise." />
          </div>
          <div className="card">
            <h2>PROSPECT • MOB • ERROR</h2>
            <ItemMessage theme="Prospect" device="--mob" status="--error" text="Une erreur est survenue lors de l'envoi." />
          </div>
          <div className="card">
            <h2>CLIENT • DESK • WARNING</h2>
            <ItemMessage theme="Client" device="--desk" status="--warning" text="La date d'expiration approche." />
          </div>
          <div className="card">
            <h2>CLIENT • MOB • SUCCESS</h2>
            <ItemMessage theme="Client" device="--mob" status="--sucess" text="Votre avenant est validé !" />
          </div>
        </div>
      );

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </div>
</body>
</html>
